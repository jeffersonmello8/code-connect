services:
  postgres:
    image: postgres:16-alpine
    container_name: code-connect-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: codeconnect
      POSTGRES_PASSWORD: codeconnect
      POSTGRES_DB: codeconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codeconnect -d codeconnect']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
